services:
  - type: web
    name: fuelpass-sl-api
    env: node
    region: singapore          # Closest to Sri Lanka
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure value
      - key: ADMIN_PASSWORD
        sync: false            # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false            # Set to your Vercel URL after deploy
      - key: DATABASE_URL
        fromDatabase:
          name: fuelpass-db
          property: connectionString

databases:
  - name: fuelpass-db
    plan: free
    region: singapore
    databaseName: fuelpass
    user: fuelpass_user
